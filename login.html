
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestoor · Acceso</title>
<style>
:root{--p:#904891;--pd:#6D2E6E;--deep:#08040f;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--deep);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.lcard{width:100%;max-width:380px;}
.logo-z{text-align:center;margin-bottom:28px;}
.logo-z img{height:36px;display:block;margin:0 auto 10px;}
.app-n{font-size:13px;font-weight:500;}
.app-n .g{color:#c9a6e8;}
.app-n .d{color:rgba(240,235,255,.3);}
.app-s{font-size:10px;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:1.8px;margin-top:3px;}
.card{background:rgba(144,72,145,.06);border:1px solid rgba(144,72,145,.25);border-radius:16px;padding:26px;}
.step-lbl{font-size:11px;font-weight:600;color:rgba(201,166,232,.5);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;}
.inp-wrap{position:relative;margin-bottom:12px;}
.inp-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(201,166,232,.3);font-size:16px;pointer-events:none;}
.inp-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:rgba(201,166,232,.3);font-size:14px;cursor:pointer;background:none;border:none;padding:4px;line-height:1;}
.inp-eye:hover{color:rgba(201,166,232,.7);}
.inp{width:100%;background:rgba(144,72,145,.08);border:1px solid rgba(144,72,145,.2);border-radius:9px;padding:11px 38px 11px 38px;font-size:13px;color:#f0ebff;font-family:var(--sans);outline:none;transition:.15s;}
.inp::placeholder{color:rgba(240,235,255,.2);}
.inp:focus{border-color:rgba(144,72,145,.6);}
.inp.err{border-color:rgba(248,113,113,.5);}
.inp-single{padding-right:12px;}
.check-row{display:flex;align-items:center;gap:8px;margin:10px 0 14px;}
.check-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--p);cursor:pointer;flex-shrink:0;}
.check-row label{font-size:12px;color:rgba(240,235,255,.4);cursor:pointer;}
.btn-p{width:100%;background:var(--p);border:none;border-radius:9px;padding:12px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:var(--sans);transition:.15s;}
.btn-p:hover{background:var(--pd);}
.btn-p:disabled{opacity:.4;cursor:not-allowed;}
.err-msg{font-size:12px;color:#f87171;margin-top:8px;min-height:16px;text-align:center;}
.olvide{display:block;text-align:center;margin-top:12px;font-size:12px;color:rgba(201,166,232,.35);text-decoration:none;cursor:pointer;background:none;border:none;font-family:var(--sans);width:100%;}
.olvide:hover{color:rgba(201,166,232,.65);}
.footer{text-align:center;margin-top:16px;}
.footer-line{font-size:10px;color:rgba(255,255,255,.1);letter-spacing:.5px;}
.divider{width:40px;height:1px;background:rgba(144,72,145,.2);margin:8px auto;}
.slogan{font-size:10px;color:rgba(201,166,232,.2);font-style:italic;}
.loading-dots{display:inline-flex;gap:4px;margin-left:6px;}
.loading-dots span{width:4px;height:4px;border-radius:50%;background:#fff;animation:ld .8s infinite both;}
.loading-dots span:nth-child(2){animation-delay:.15s;}
.loading-dots span:nth-child(3){animation-delay:.3s;}
@keyframes ld{0%,80%,100%{opacity:.2}40%{opacity:1}}
/* Panel de éxito recuperación */
.ok-msg{font-size:13px;color:#6ee7b7;text-align:center;margin-top:10px;line-height:1.6;display:none;}
</style>
</head>
<body>
<div class="lcard">
  <div class="logo-z">
    <img src="https://assets.cdn.filesafe.space/kfq1F3czdejkInyTMLkO/media/6982b1a12dd9857339e39ae1.png" alt="Contadoor"/>
    <div class="app-n"><span class="g">Gestoor</span> <span class="d">· Contadoor</span></div>
    <div class="app-s">Sistema de gestión interno</div>
  </div>
  <div class="card" id="cardLogin">
    <!-- INICIO DE SESIÓN -->
    <div id="panelLogin">
      <div class="step-lbl">Iniciar sesión</div>
      <div class="inp-wrap">
        <span class="inp-ico">✉</span>
        <input class="inp" type="email" id="inp-email" placeholder="Correo electrónico" autocomplete="email"/>
      </div>
      <div class="inp-wrap">
        <span class="inp-ico">🔒</span>
        <input class="inp" type="password" id="inp-pass" placeholder="Contraseña" autocomplete="current-password"/>
        <button type="button" class="inp-eye" id="btn-eye" title="Mostrar/ocultar contraseña">👁</button>
      </div>
      <div class="check-row">
        <input type="checkbox" id="chk-recordar" checked>
        <label for="chk-recordar">Recordar mi correo</label>
      </div>
      <button class="btn-p" id="btn-login">Iniciar sesión</button>
      <div class="err-msg" id="err-login"></div>
      <button type="button" class="olvide" id="btn-olvide">¿Olvidaste tu contraseña?</button>
    </div>
    <!-- RECUPERAR CONTRASEÑA -->
    <div id="panelRecuperar" style="display:none">
      <div class="step-lbl">Recuperar contraseña</div>
      <div class="inp-wrap">
        <span class="inp-ico">✉</span>
        <input class="inp" type="email" id="inp-email-rec" placeholder="Tu correo electrónico" autocomplete="email"/>
      </div>
      <button class="btn-p" id="btn-enviar-rec">Enviar instrucciones</button>
      <div class="err-msg" id="err-rec"></div>
      <div class="ok-msg" id="ok-rec">
        ✅ Revisa tu correo.<br>Recibirás un link para restablecer tu contraseña.
      </div>
      <button type="button" class="olvide" id="btn-volver-login">← Volver al inicio de sesión</button>
    </div>
  </div>
  <div class="footer">
    <div class="footer-line">Contadoor Chile · Solo uso interno autorizado</div>
    <div class="divider"></div>
    <div class="slogan">Somos la puerta a tu solución</div>
  </div>
</div>

<!-- Supabase JS SDK (v2) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var SB_URL='https://ulxoxqbuxiuylaolaqxj.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVseG94cWJ1eGl1eWxhb2xhcXhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNDMwNDcsImV4cCI6MjA5OTcxOTA0N30.bN_KeSJFEBKSBzwTixRQs92y6aEhBo-SJs4fGxZgAbA';

// Crear cliente Supabase
var sbClient=window.supabase.createClient(SB_URL,SB_KEY,{
  auth:{autoRefreshToken:true,persistSession:true,detectSessionInUrl:true}
});

// Redireccionamiento por rol
var ROL_DESTINOS={
  master:   'index.html',
  admin:    'index.html',
  rrhh:     'reportes-rrhh/index.html',
  contable: 'reportes-contable/index.html',
  pagos:    'reportes-pagos/index.html',
  cobranza: 'cobranza/index.html'
};

function setBtn(btn,html,disabled){btn.innerHTML=html;btn.disabled=!!disabled;}
function setErr(id,msg){document.getElementById(id).textContent=msg||'';}

// ── INICIO DE SESIÓN ──────────────────────────────────────────────────────────
document.getElementById('btn-login').onclick=function(){
  var email=(document.getElementById('inp-email').value||'').trim();
  var pass=document.getElementById('inp-pass').value||'';
  setErr('err-login','');

  if(!email||!pass){
    setErr('err-login','Ingresa tu correo y contraseña.');
    return;
  }

  var btn=document.getElementById('btn-login');
  setBtn(btn,'Verificando<span class="loading-dots"><span></span><span></span><span></span></span>',true);

  sbClient.auth.signInWithPassword({email:email,password:pass})
    .then(function(result){
      if(result.error){
        setBtn(btn,'Iniciar sesión',false);
        // Mensaje genérico — nunca revelar si el email existe o no
        setErr('err-login','Correo o contraseña incorrectos.');
        return;
      }

      var authUser=result.data.user;

      // Cargar perfil desde public.usuarios
      return sbClient.from('usuarios')
        .select('id,nombre,iniciales,rol,rol_label,es_master,activo,modulos,wa,email')
        .eq('auth_user_id',authUser.id)
        .single()
        .then(function(profileResult){
          var perfil=profileResult.data;
          var err=profileResult.error;

          if(err||!perfil){
            sbClient.auth.signOut();
            sessionStorage.removeItem('usuario_activo');
            setBtn(btn,'Iniciar sesión',false);
            setErr('err-login','Tu cuenta no está configurada en Gestoor. Contacta al administrador.');
            return;
          }
          if(!perfil.activo){
            sbClient.auth.signOut();
            sessionStorage.removeItem('usuario_activo');
            setBtn(btn,'Iniciar sesión',false);
            setErr('err-login','Tu cuenta está desactivada. Contacta al administrador.');
            return;
          }

          // Guardar email si "recordarme" está marcado
          var recordar=document.getElementById('chk-recordar').checked;
          if(recordar){
            localStorage.setItem('gestoor_email_guardado',email);
          }else{
            localStorage.removeItem('gestoor_email_guardado');
          }

          // Cache visual para módulos (formato compatible con módulos existentes)
          var sesion={
            id:perfil.id,
            nombre:perfil.nombre,
            iniciales:perfil.iniciales||(perfil.nombre.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase()),
            rol:perfil.rol,
            rolLabel:perfil.rol_label||perfil.rol,
            email:perfil.email||authUser.email||'',
            wa:perfil.wa||'',
            esMaster:perfil.es_master===true,
            modulos:perfil.modulos||[],
            tsLogin:Date.now()
          };
          sessionStorage.setItem('usuario_activo',JSON.stringify(sesion));

          // Redirigir según rol
          var destino=ROL_DESTINOS[perfil.rol]||'index.html';
          window.location.href=destino;
        });
    })
    .catch(function(e){
      console.error('[login] Error:',e);
      setBtn(btn,'Iniciar sesión',false);
      setErr('err-login','Error de conexión. Intenta de nuevo.');
    });
};

// ── MOSTRAR/OCULTAR CONTRASEÑA ────────────────────────────────────────────────
document.getElementById('btn-eye').onclick=function(){
  var inp=document.getElementById('inp-pass');
  inp.type=inp.type==='password'?'text':'password';
};

// ── NAVEGACIÓN ENTRE PANELES ──────────────────────────────────────────────────
document.getElementById('btn-olvide').onclick=function(){
  document.getElementById('panelLogin').style.display='none';
  document.getElementById('panelRecuperar').style.display='block';
  // Pre-llenar email si ya lo escribió
  var emailActual=document.getElementById('inp-email').value||'';
  if(emailActual) document.getElementById('inp-email-rec').value=emailActual;
  setErr('err-rec','');
  document.getElementById('ok-rec').style.display='none';
};
document.getElementById('btn-volver-login').onclick=function(){
  document.getElementById('panelRecuperar').style.display='none';
  document.getElementById('panelLogin').style.display='block';
};

// ── RECUPERAR CONTRASEÑA ──────────────────────────────────────────────────────
document.getElementById('btn-enviar-rec').onclick=function(){
  var email=(document.getElementById('inp-email-rec').value||'').trim();
  setErr('err-rec','');
  document.getElementById('ok-rec').style.display='none';

  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    setErr('err-rec','Ingresa un correo válido.');
    return;
  }

  var btn=document.getElementById('btn-enviar-rec');
  setBtn(btn,'Enviando<span class="loading-dots"><span></span><span></span><span></span></span>',true);

  // Usar la URL real del proyecto (GitHub Pages o dominio futuro)
  // Supabase Dashboard → Auth → URL Configuration → Redirect URLs
  // debe incluir esta URL en la lista blanca
  var resetUrl=window.location.origin+window.location.pathname.replace('login.html','reset-password.html');

  sbClient.auth.resetPasswordForEmail(email,{redirectTo:resetUrl})
    .then(function(result){
      setBtn(btn,'Enviar instrucciones',false);
      if(result.error){
        // Error genérico — no confirmar si el email existe
        console.error('[login] resetPassword error:',result.error);
      }
      // Siempre mostrar mensaje de éxito (evita enumeration attack)
      document.getElementById('ok-rec').style.display='block';
    })
    .catch(function(e){
      console.error('[login] resetPassword excepción:',e);
      setBtn(btn,'Enviar instrucciones',false);
      setErr('err-rec','Error de conexión. Intenta de nuevo.');
    });
};

// ── ENTER EN CAMPOS ───────────────────────────────────────────────────────────
document.getElementById('inp-email').addEventListener('keydown',function(e){
  if(e.key==='Enter') document.getElementById('inp-pass').focus();
});
document.getElementById('inp-pass').addEventListener('keydown',function(e){
  if(e.key==='Enter') document.getElementById('btn-login').onclick();
});
document.getElementById('inp-email-rec').addEventListener('keydown',function(e){
  if(e.key==='Enter') document.getElementById('btn-enviar-rec').onclick();
});

// ── LIMPIAR ERRORES AL ESCRIBIR ───────────────────────────────────────────────
['inp-email','inp-pass'].forEach(function(id){
  document.getElementById(id).addEventListener('input',function(){
    setErr('err-login','');
    this.classList.remove('err');
  });
});

// ── INIT: si ya hay sesión válida, redirigir al dashboard ─────────────────────
(function(){
  // Pre-llenar email guardado
  var emailGuardado=localStorage.getItem('gestoor_email_guardado')||'';
  if(emailGuardado){
    document.getElementById('inp-email').value=emailGuardado;
    document.getElementById('chk-recordar').checked=true;
  }

  // Verificar identidad real contra Supabase (no solo cache local)
  sbClient.auth.getUser().then(function(result){
    var user=result.data&&result.data.user;
    var authErr=result.error;

    if(authErr||!user){
      // Sin usuario válido — limpiar cache y permanecer en login
      sessionStorage.removeItem('usuario_activo');
      return;
    }

    // Usuario autenticado — verificar perfil activo en public.usuarios
    sbClient.from('usuarios')
      .select('rol,es_master,activo,auth_user_id')
      .eq('auth_user_id',user.id)
      .single()
      .then(function(pr){
        if(pr.data&&pr.data.activo){
          // Perfil válido y activo → redirigir según rol
          var destino=ROL_DESTINOS[pr.data.rol]||'index.html';
          window.location.href=destino;
        }else{
          // Perfil no existe, consulta falló o activo=false → signOut + limpiar
          sbClient.auth.signOut().catch(function(){});
          sessionStorage.removeItem('usuario_activo');
        }
      }).catch(function(){
        // Error de red/BD — signOut preventivo y permanecer en login
        sbClient.auth.signOut().catch(function(){});
        sessionStorage.removeItem('usuario_activo');
      });
  }).catch(function(){
    // Error inesperado — permanecer en login sin mostrar error técnico
    sessionStorage.removeItem('usuario_activo');
  });
})();
</script>
</body>
</html>
